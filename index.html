<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<header class="header">

    <div class="left">
        <span class="logo">Juana Amaro</span>
    </div>

    <div class="right">

        <div class="top-controls">

            <button id="themeSwitch" class="switch">
                <div class="track">
                    <div class="clouds"></div>
                    <div class="stars"></div>
                    <div class="knob">
                        <span class="icon">🌙</span>
                    </div>
                </div>
            </button>

            <div class="lang-switch">

                <button id="esBtn" class="flag-btn">
                    <svg viewBox="0 0 640 480" width="24">
                        <rect width="640" height="480" fill="#AA151B"/>
                        <rect y="120" width="640" height="240" fill="#F1BF00"/>
                    </svg>
                </button>

                <button id="enBtn" class="flag-btn">
                    <svg viewBox="0 0 60 30" width="24">
                        <rect width="60" height="30" fill="#012169"/>
                        <polygon points="0,0 6,0 60,24 60,30 54,30 0,6" fill="#FFFFFF"/>
                        <polygon points="60,0 54,0 0,24 0,30 6,30 60,6" fill="#FFFFFF"/>
                        <polygon points="0,0 3,0 60,27 60,30 57,30 0,3" fill="#C8102E"/>
                        <polygon points="60,0 57,0 0,27 0,30 3,30 60,3" fill="#C8102E"/>
                        <rect x="25" width="10" height="30" fill="#FFFFFF"/>
                        <rect y="10" width="60" height="10" fill="#FFFFFF"/>
                        <rect x="27" width="6" height="30" fill="#C8102E"/>
                        <rect y="12" width="60" height="6" fill="#C8102E"/>
                    </svg>
                </button>

            </div>

        </div>

        <nav class="menu">
            <a id="m-home" href="#home">Home</a>
            <span class="star">✦</span>
        
            <a id="m-about" href="#about">Sobre mí</a>
            <span class="star">✦</span>
        
            <a id="m-projects" href="#projects">Proyectos</a>
            <span class="star">✦</span>
        
            <a id="m-blog" href="#blog">Divulgación</a>
            <span class="star">✦</span>
        
            <a id="m-contact" href="#contact">Contacto</a>
        
        </nav>

    </div>

</header>

<main class="content">

  <section class="hero">

    <div class="orbit-layer">

        <div class="orbit orbit1">
            <div class="planet"></div>
        </div>

        <div class="orbit orbit2">
            <div class="planet"></div>
        </div>

        <div class="orbit orbit3">
            <div class="planet"></div>
        </div>

    </div>

    <h1 class="terminal-title">
        <span id="typed"></span><span class="cursor">|</span>
    </h1>
      <div class="liquid-circle" id="liquid"></div>

</section>
    
</main>

<script src="script.js"></script>

</body>
</html>
