<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<header class="header">

    <div class="left">
        <span class="logo">Juana Amaro</span>
    </div>

    <div class="right">

        <!-- 🌙 SWITCH TEMA -->
        <button id="themeSwitch" class="switch">

            <div class="track">

                <div class="clouds"></div>
                <div class="stars"></div>

                <div class="knob">
                    <span class="icon">🌙</span>
                </div>

            </div>

        </button>

        <!-- 🌍 IDIOMA -->
   <div class="lang-switch">

    <!-- 🇪🇸 ESPAÑA -->
    <button id="esBtn" class="flag-btn">
        <svg viewBox="0 0 640 480" width="24">
            <rect width="640" height="480" fill="#AA151B"/>
            <rect y="120" width="640" height="240" fill="#F1BF00"/>
        </svg>
    </button>

    <!-- 🇬🇧 REINO UNIDO -->
    <button id="enBtn" class="flag-btn">
        <svg viewBox="0 0 640 480" width="24">
            <rect width="640" height="480" fill="#012169"/>

            <!-- cruz blanca -->
            <rect x="280" width="80" height="480" fill="#FFFFFF"/>
            <rect y="200" width="640" height="80" fill="#FFFFFF"/>

            <!-- cruz roja -->
            <rect x="300" width="40" height="480" fill="#C8102E"/>
            <rect y="220" width="640" height="40" fill="#C8102E"/>
        </svg>
    </button>

</div>
        
    </div>

</header>

<main class="content">

    <h1 id="title">Hola, soy Juana</h1>
    <p id="text">Bienvenida a mi portfolio</p>

    <div style="height:2000px;"></div>

</main>

<script src="script.js"></script>

</body>
</html>
